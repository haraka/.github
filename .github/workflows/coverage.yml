name: Test Coverage

on:
  workflow_call:

env:
  CI: true
  NODE_ENV: cov
  HARAKA_COVERAGE: 1

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - uses: actions/setup-node@v6
      - uses: actions/checkout@v6
      - name: install
        run: npm ci || npm install
      - name: coverage
        run: npm run test:coverage:lcov || (npm install --no-save c8 && npx c8 --reporter=lcov npm test)

      - name: codecov
        uses: codecov/codecov-action@v5

      - name: Coveralls
        uses: coverallsapp/github-action@v2
